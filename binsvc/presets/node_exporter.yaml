# Prometheus Node Exporter - host metrics exporter.
# https://github.com/prometheus/node_exporter
#
# Ported from the legacy exporter state's `node` defaults into binsvc's
# archive-only preset shape.

type: node_exporter

user:
  manage: true
  home: "/opt/services/{type}"
  name: node_exporter
  group: node_exporter

svc:
  version_resolver: github
  version: latest
  source: "https://github.com/prometheus/node_exporter/releases/download/{tag}/node_exporter-{tag_vstrip}.{kernel_lower}-{osarch}.tar.gz"
  source_hash: "https://github.com/prometheus/node_exporter/releases/download/{tag}/sha256sums.txt"
  tar:
    args: "--strip-components=1 --no-anchored"
    unpack: node_exporter
  exec: "{install_dir}/node_exporter"
  # Opt-in idempotency guard (no default): node_exporter reports versions
  # without the leading "v", so match {tag_vstrip}.
  version_check: "[[ $({binary} --version 2>&1) =~ {tag_vstrip} ]]"
  args:
    # Leading "-" in the key renders as a Prometheus-style "--flag=value".
    - "-web.listen-address": "127.0.0.1:9100"

systemd:
  Service:
    ExecStart: "{exec} {args}"
    User: "{user_name}"
    Group: "{user_group}"

nginx:
  manage: false
